# This file is used to configure the DeepSeek translator

# url is the URL of the DeepSeek API
# https://platform.deepseek.com/api_keys
url: https://api.deepseek.com/chat/completions
# or set DEEPSEEK_API_KEY in environment.
apiKey:

# all modes can find in the following link
# https://api-docs.deepseek.com/
engineMapping:
  deepseek-v4-flash: # engineCode
    name: DeepSeek-V4-Flash # engineName
    model: deepseek-v4-flash # Model ID, API parameters.
  # deepseek-v4-pro: # engineCode
  #   name: DeepSeek-V4-Pro # engineName
  #   model: deepseek-v4-pro # Model ID, API parameters.
# you can add more engines here


##
#
#    Input Format:
#    [{"id":1,"text":"Source Text"}]
#
#    Output Format:
#    {"translations":[{"id":1,"text":"Translated Text"}]}
#
#    glossaryList format:
#      {
#        "test": "检测",
#        "internet": "互联网"
#      }
#
##

concurrent: 3  # Number of concurrent requests

# Thinking-mode switch (optional). Default: thinking disabled.
# Set to true to enable thinking mode for improved translation quality.
# enableThinking: true

# Reasoning intensity (optional). Only effective when thinking is enabled.
# Default: "high". Set to "max" for strongest reasoning on complex tasks.
# reasoningEffort: "max"

systemPrompts: |
    You are a professional translation processor. Strictly follow:
    1. Maintain strict ID-text correspondence
    2. Detect and correct OCR errors (e.g., character confusion, missing symbols)
    3. Apply vocabulary replacements during translation
    4. Preserve JSON structure with proper escaping
    5. Output only required translations

userPrompts: |
    Translate JSON entries to {{targetLang}}:

    Input Format:
    [{"id":1,"text":"Source Text"}]
    
    Output Format:
    {"translations":[{"id":1,"text":"Translated Text"}]}
    
    Vocabulary (case-{{glossarySensitive}}):
    {{glossaryList}}
    
    Instructions:
    1. Processing sequence:
      - Phase 1: Fix OCR errors (e.g., 1↔l, 0↔O, missing punctuation)
      - Phase 2: Translate text while applying vocabulary replacements
      - Phase 3: Ensure JSON-safe escaping for all outputs
    2. Preserve numerical values and technical codes unchanged
    3. Never add explanations or non-requested content
    
    BEGIN INPUT:
    {{original}}
