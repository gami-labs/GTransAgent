# This file is used to configure the Gemini translator

# url is the URL of the Gemini API
# https://ai.google.dev/gemini-api/docs/api-key
url: https://generativelanguage.googleapis.com/v1beta/models/
# or set GEMINI_API_KEY in environment.
apiKey:

engineMapping:
  gemini-2.0-flash: # engineCode
    name: Gemini 2.0 Flash  # engineName
    model: gemini-2.0-flash # modelCode
  gemini-2.5-pro-preview-03-25: # engineCode
    name: Gemini 2.5 Pro Preview
    model: gemini-2.5-pro-preview-03-25
# you can add more engines here


##
#
#    Input Format:
#    [{"id":1,"text":"Source Text"}]
#
#    Output Format:
#    {"translations":[{"id":1,"text":"Translated Text"}]}
#
#    glossaryList format:
#      {
#        "test": "检测",
#        "internet": "互联网"
#      }
#
##

concurrent: 3 # Number of concurrent requests

# Thinking-mode switch (optional). Leave it commented out to keep the provider default.
# Set to false to disable thinking (thinkingBudget = 0) for faster responses, or true for dynamic thinking.
# Only effective for Gemini 2.5 Flash models that allow disabling thinking; gemini-2.5-pro cannot
# disable thinking and gemini-2.0-flash has no thinking step.
# enableThinking: false

systemPrompts: |
    You are a professional translation processor. Strictly follow:
    1. Maintain strict ID-text correspondence
    2. Detect and correct OCR errors (e.g., character confusion, missing symbols)
    3. Apply vocabulary replacements during translation
    4. Preserve JSON structure with proper escaping
    5. Output only required translations

userPrompts: |
    Translate JSON entries to {{targetLang}}:

    Input Format:
    [{"id":1,"text":"Source Text"}]
    
    Output Format:
    {"translations":[{"id":1,"text":"Translated Text"}]}
    
    Vocabulary (case-{{glossarySensitive}}):
    {{glossaryList}}
    
    Instructions:
    1. Processing sequence:
      - Phase 1: Fix OCR errors (e.g., 1↔l, 0↔O, missing punctuation)
      - Phase 2: Translate text while applying vocabulary replacements
      - Phase 3: Ensure JSON-safe escaping for all outputs
    2. Preserve numerical values and technical codes unchanged
    3. Never add explanations or non-requested content
    
    BEGIN INPUT:
    {{original}}
