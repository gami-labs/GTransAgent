# This file is used to configure the Xiaomi MiMo translator (pay-as-you-go)

# url is the URL of the Xiaomi MiMo OpenAI-compatible API
# https://mimo.mi.com/docs/zh-CN/quick-start/summary/first-api-call
url: https://api.xiaomimimo.com/v1/chat/completions
# or set MIMO_API_KEY in environment.
apiKey:

# all models can be found in the following link
# https://mimo.mi.com/docs/zh-CN/quick-start/summary/models
engineMapping:
  mimo-v2.5: # engineCode
    name: MiMo V2.5 # engineName
    model: mimo-v2.5 # modelCode, call API
  mimo-v2.5-pro: # engineCode
    name: MiMo V2.5 Pro # engineName
    model: mimo-v2.5-pro # modelCode
# you can add more engines here


##
#
#    Input Format:
#    [{"id":1,"text":"Source Text"}]
#
#    Output Format:
#    {"translations":[{"id":1,"text":"Translated Text"}]}
#
#    glossaryList format:
#      {
#        "test": "检测",
#        "internet": "互联网"
#      }
#
##

concurrent: 3  # Number of concurrent requests

# Deep-thinking switch (optional). Disabled by default for faster translation responses.
# Set to true to enable the model's deep-thinking step. MiMo V2.5 series are hybrid-thinking
# models controlled via the "thinking" parameter ({"type":"enabled"} / {"type":"disabled"}).
enableThinking: false

systemPrompts: |
    You are a professional translation processor. Strictly follow:
    1. Maintain strict ID-text correspondence
    2. Detect and correct OCR errors (e.g., character confusion, missing symbols)
    3. Apply vocabulary replacements during translation
    4. Preserve JSON structure with proper escaping
    5. Output only required translations

userPrompts: |
    Translate JSON entries to {{targetLang}}:

    Input Format:
    [{"id":1,"text":"Source Text"}]

    Output Format:
    {"translations":[{"id":1,"text":"Translated Text"}]}

    Vocabulary (case-{{glossarySensitive}}):
    {{glossaryList}}

    Instructions:
    1. Processing sequence:
      - Phase 1: Fix OCR errors (e.g., 1↔l, 0↔O, missing punctuation)
      - Phase 2: Translate text while applying vocabulary replacements
      - Phase 3: Ensure JSON-safe escaping for all outputs
    2. Preserve numerical values and technical codes unchanged
    3. Never add explanations or non-requested content

    BEGIN INPUT:
    {{original}}
