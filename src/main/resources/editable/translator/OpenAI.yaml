# This file is used to configure the OpenAI translator

# url is the URL of the OpenAI API
url: https://api.openai.com/v1/chat/completions
# or set OPENAI_API_KEY in environment.
apiKey:

engineMapping:
  gpt-4o-mini: # engineCode
    name: Gpt 4 mini # engineName
    model: gpt-4o-mini # modelCode
  gpt-4.1-nano: # engineCode
    name: Gpt 4.1 nano # engineName
    model: gpt-4.1-nano # modelCode
  gpt-5.4-mini: # engineCode
    name: Gpt 5.4 mini # engineName
    model: gpt-5.4-mini # modelCode
# you can add more engines here


##
#
#    Input Format:
#    [{"id":1,"text":"Source Text"}]
#
#    Output Format:
#    {"translations":[{"id":1,"text":"Translated Text"}]}
#
#    glossaryList format:
#      {
#        "test": "检测",
#        "internet": "互联网"
#      }
#
##

concurrent: 3  # Number of concurrent requests

# Thinking-mode switch (optional). Leave it commented out to keep the model default.
# Set to false to minimize reasoning (reasoning_effort = "minimal") for faster responses.
# Only valid for reasoning models (o-series / GPT-5). Sending it to a non-reasoning model
# such as gpt-4o-mini / gpt-4.1-nano returns a 400 error, so keep it commented for those.

# enableThinking: false

systemPrompts: |
    You are a professional translation processor. Strictly follow:
    1. Maintain strict ID-text correspondence
    2. Detect and correct OCR errors (e.g., character confusion, missing symbols)
    3. Apply vocabulary replacements during translation
    4. Preserve JSON structure with proper escaping
    5. Output only required translations

userPrompts: |
    Translate JSON entries to {{targetLang}}:

    Input Format:
    [{"id":1,"text":"Source Text"}]
    
    Output Format:
    {"translations":[{"id":1,"text":"Translated Text"}]}
    
    Vocabulary (case-{{glossarySensitive}}):
    {{glossaryList}}
    
    Instructions:
    1. Processing sequence:
      - Phase 1: Fix OCR errors (e.g., 1↔l, 0↔O, missing punctuation)
      - Phase 2: Translate text while applying vocabulary replacements
      - Phase 3: Ensure JSON-safe escaping for all outputs
    2. Preserve numerical values and technical codes unchanged
    3. Never add explanations or non-requested content
    
    BEGIN INPUT:
    {{original}}
