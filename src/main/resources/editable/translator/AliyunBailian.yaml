# This file is used to configure the Aliyun Bailian translator

# url is the URL of the Aliyun Bailian API
# https://bailian.console.aliyun.com/
url: https://dashscope.aliyuncs.com/compatible-mode/v1/chat/completions
# or set ALIYUN_BAILIAN_API_KEY in environment.
apiKey:

# all modes can find in the following link
# https://bailian.console.aliyun.com/?tab=model#/model-market
engineMapping:
  qwen-plus: # engineCode
    name: 通义千问-Plus # engineName
    model: qwen-plus # modelCode, call API
  qwen-turbo: # engineCode
    name: 通义千问-Turbo # engineName
    model: qwen-turbo # modelCode
  deepseek-v3-aliyun: # engineCode
    name: DeepSeek V3 (Aliyun) # engineName
    model: deepseek-v3 # modelCode
# you can add more engines here


##
#
#    Input Format:
#    [{"id":1,"text":"Source Text"}]
#
#    Output Format:
#    {"translations":[{"id":1,"text":"Translated Text"}]}
#
#    glossaryList format:
#      {
#        "test": "检测",
#        "internet": "互联网"
#      }
#
##

concurrent: 3  # Number of concurrent requests
systemPrompts: |
    You are a professional translation processor. Strictly follow:
    1. Maintain strict ID-text correspondence
    2. Detect and correct OCR errors (e.g., character confusion, missing symbols)
    3. Apply vocabulary replacements during translation
    4. Preserve JSON structure with proper escaping
    5. Output only required translations

userPrompts: |
    Translate JSON entries to {{targetLang}}:

    Input Format:
    [{"id":1,"text":"Source Text"}]
    
    Output Format:
    {"translations":[{"id":1,"text":"Translated Text"}]}
    
    Vocabulary (case-{{glossarySensitive}}):
    {{glossaryList}}
    
    Instructions:
    1. Processing sequence:
      - Phase 1: Fix OCR errors (e.g., 1↔l, 0↔O, missing punctuation)
      - Phase 2: Translate text while applying vocabulary replacements
      - Phase 3: Ensure JSON-safe escaping for all outputs
    2. Preserve numerical values and technical codes unchanged
    3. Never add explanations or non-requested content
    
    BEGIN INPUT:
    {{original}}
